name: Desktop packages

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            bundle-glob: |
              src-tauri/target/release/bundle/msi/*.msi
              src-tauri/target/release/bundle/nsis/*.exe
          - name: macos-arm64
            os: macos-latest
            bundle-glob: |
              src-tauri/target/release/bundle/dmg/*.dmg
              src-tauri/target/release/bundle/macos/*.app.tar.gz
          - name: linux-x64
            os: ubuntu-latest
            bundle-glob: |
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/rpm/*.rpm
              src-tauri/target/release/bundle/appimage/*.AppImage
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux webview dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install locked dependencies
        run: npm ci

      - name: Lint and test (web)
        run: |
          npm run lint
          npm test

      - name: Rust checks
        working-directory: src-tauri
        shell: bash
        run: |
          cargo fmt --check
          cargo test

      - name: Build desktop bundles (unsigned)
        run: npm run tauri build
        env:
          CI: "true"

      - name: Package macOS .app for upload
        if: runner.os == 'macOS'
        shell: bash
        run: |
          cd src-tauri/target/release/bundle/macos
          for app in *.app; do tar -czf "${app}.tar.gz" "$app"; done

      - name: Verify expected artefacts exist
        shell: bash
        run: |
          shopt -s nullglob globstar
          found=0
          while IFS= read -r pattern; do
            [ -z "$pattern" ] && continue
            for f in $pattern; do
              echo "artefact: $f"
              found=1
            done
          done <<< "${{ matrix.bundle-glob }}"
          if [ "$found" -eq 0 ]; then
            echo "::error::No desktop artefacts were produced for ${{ matrix.name }}"
            exit 1
          fi

      - name: Generate checksums
        shell: bash
        run: |
          shopt -s nullglob globstar
          mkdir -p checksums
          : > checksums/SHA256SUMS-${{ matrix.name }}.txt
          while IFS= read -r pattern; do
            [ -z "$pattern" ] && continue
            for f in $pattern; do
              if command -v sha256sum >/dev/null; then
                sha256sum "$f" >> checksums/SHA256SUMS-${{ matrix.name }}.txt
              else
                shasum -a 256 "$f" >> checksums/SHA256SUMS-${{ matrix.name }}.txt
              fi
            done
          done <<< "${{ matrix.bundle-glob }}"
          cat checksums/SHA256SUMS-${{ matrix.name }}.txt

      - name: Upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: engineering-workbench-0.1.0-${{ matrix.name }}-unsigned
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app.tar.gz
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage
            checksums/SHA256SUMS-${{ matrix.name }}.txt
